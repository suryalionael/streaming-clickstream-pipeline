name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy

      - name: Run Ruff
        run: ruff check producer/ spark/ dashboard/ storage/ tests/

      - name: Check Black formatting
        run: black --check --diff producer/ spark/ dashboard/ storage/ tests/

      - name: Check isort
        run: isort --check-only --diff producer/ spark/ dashboard/ storage/ tests/

  typecheck:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-python-dateutil types-pytz types-PyYAML
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run mypy
        run: mypy producer/ spark/ dashboard/ storage/ --ignore-missing-imports || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt 2>/dev/null || pip install pytest pytest-cov pytest-timeout
          pip install confluent-kafka python-dateutil pytz pyyaml pandas duckdb

      - name: Run core unit tests
        run: |
          pytest tests/test_generator.py tests/test_models.py tests/test_schemas.py tests/test_dashboard.py tests/test_streaming.py -v --tb=short

      - name: Run all tests (excluding docker)
        run: |
          pytest tests/ -m "not docker" -v --tb=short --timeout=60 --ignore=tests/test_transforms.py || true

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build producer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/producer/Dockerfile
          push: false
          tags: clickstream-producer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build spark image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/spark/Dockerfile
          push: false
          tags: clickstream-spark:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dashboard/Dockerfile
          push: false
          tags: clickstream-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker compose validation
        run: docker compose config
